services:
  - type: web
    runtime: node
    name: aurora-esports-ai
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/quote-ai/status
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: AI_HOST
        value: 0.0.0.0
      - key: AI_ALLOWED_ORIGINS
        value: https://ken0517.github.io
      - key: AI_TRUST_PROXY
        value: "true"
